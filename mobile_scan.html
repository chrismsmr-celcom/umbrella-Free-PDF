<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Umbrella Mobile Scan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #311038; 
            --accent: #F0D13C; 
            --success: #27ae60;
            --error: #e74c3c;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #f5f5fa 0%, #e8e8f0 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        
        .card { 
            background: white; 
            width: 100%; 
            max-width: 450px; 
            padding: 40px 25px; 
            border-radius: 35px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            height: 45px;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        h2 { 
            color: var(--primary); 
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 800;
        }
        
        .subtitle {
            color: #888; 
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        .modes { 
            margin-bottom: 30px; 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            background: #f8f8fc;
            padding: 12px;
            border-radius: 50px;
        }
        
        .modes label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 30px;
            transition: all 0.3s;
        }
        
        .modes input[type="radio"] {
            accent-color: var(--primary);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .btn-scan { 
            background: var(--primary); 
            color: var(--accent); 
            border: none; 
            padding: 18px 30px; 
            border-radius: 50px; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(49, 16, 56, 0.3);
        }
        
        .btn-scan:active {
            transform: scale(0.98);
        }
        
        .loading { 
            display: none; 
            margin-top: 25px;
            padding: 15px;
            background: #f8f8fc;
            border-radius: 15px;
        }
        
        .loading i {
            color: var(--primary);
            font-size: 1.2rem;
            margin-right: 10px;
        }
        
        .loading-text {
            color: var(--primary);
            font-weight: 600;
            display: inline-block;
        }
        
        .success-icon {
            font-size: 4rem;
            color: var(--success);
            margin-bottom: 20px;
            animation: scaleIn 0.5s ease;
        }
        
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        
        .error-icon {
            font-size: 4rem;
            color: var(--error);
            margin-bottom: 20px;
        }
        
        .info-text {
            font-size: 0.85rem;
            color: #999;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f5;
        }
        
        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            h2 { font-size: 1.5rem; }
            .btn-scan { padding: 15px 25px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="card" id="mainCard">
        <img src="https://oysdycuouodarfkmdtop.supabase.co/storage/v1/object/public/LOGO/Moniteo.png" alt="Logo" class="logo">
        <h2>Numérisation</h2>
        <p class="subtitle">Prenez une photo de votre document</p>
        
        <div class="modes">
            <label>
                <input type="radio" name="scanMode" value="color" checked> 
                <i class="fas fa-palette"></i> Couleur
            </label>
            <label>
                <input type="radio" name="scanMode" value="grayscale"> 
                <i class="fas fa-adjust"></i> Noir & Blanc
            </label>
        </div>

        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
        
        <button class="btn-scan" id="uploadBtn">
            <i class="fa fa-camera"></i> PRENDRE LA PHOTO
        </button>
        
        <div id="loader" class="loading">
            <i class="fa fa-spinner fa-spin"></i>
            <span class="loading-text">Traitement en cours...</span>
        </div>
        
        <div class="info-text">
            <i class="fa fa-shield-alt"></i> Document sécurisé - Transmission chiffrée
        </div>
    </div>

    <script>
        const BASE_URL = window.location.origin;
        const urlParams = new URLSearchParams(window.location.search);
        const session = urlParams.get('s');
        
        const cameraInput = document.getElementById('cameraInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const loader = document.getElementById('loader');
        const mainCard = document.getElementById('mainCard');
        
        if (!session) {
            showError('Session invalide', 'Veuillez générer un nouveau QR code');
        }
        
        uploadBtn.onclick = () => cameraInput.click();
        
        cameraInput.onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                showError('Format non supporté', 'Veuillez sélectionner une image');
                cameraInput.value = '';
                return;
            }
            
            if (file.size > 20 * 1024 * 1024) {
                showError('Image trop volumineuse', 'Maximum 20MB');
                cameraInput.value = '';
                return;
            }
            
            const mode = document.querySelector('input[name="scanMode"]:checked').value;
            
            setLoading(true);
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('mode', mode);
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000);
            
            try {
                const response = await fetch(`${BASE_URL}/scan/upload-mobile/${session}`, { 
                    method: 'POST', 
                    body: formData,
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    showSuccess();
                } else {
                    let errorMessage = 'Erreur lors de l\'envoi';
                    try {
                        const errorData = await response.json();
                        errorMessage = errorData.detail || errorMessage;
                    } catch(e) {}
                    throw new Error(errorMessage);
                }
                
            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name === 'AbortError') {
                    showError('Timeout', 'Le serveur met trop de temps à répondre');
                } else {
                    showError('Erreur', error.message || 'Envoi impossible');
                }
                setLoading(false);
                cameraInput.value = '';
            }
        };
        
        function setLoading(isLoading) {
            if (isLoading) {
                uploadBtn.style.display = 'none';
                loader.style.display = 'block';
                uploadBtn.disabled = true;
            } else {
                uploadBtn.style.display = 'flex';
                loader.style.display = 'none';
                uploadBtn.disabled = false;
            }
        }
        
        function showSuccess() {
            mainCard.innerHTML = `
                <div class="success-icon">
                    <i class="fa fa-check-circle"></i>
                </div>
                <h2 style="color: var(--success)">Envoyé !</h2>
                <p style="margin: 20px 0; color: #555;">Document prêt sur votre ordinateur</p>
                <button class="btn-scan" onclick="closeWindow()" style="background: var(--success); margin-top: 20px;">
                    <i class="fa fa-check"></i> Fermer
                </button>
                <div class="info-text">Fermeture automatique dans 5 secondes</div>
            `;
            setTimeout(() => closeWindow(), 5000);
        }
        
        function showError(title, message) {
            mainCard.innerHTML = `
                <div class="error-icon">
                    <i class="fa fa-exclamation-circle"></i>
                </div>
                <h2 style="color: var(--error)">${title}</h2>
                <p style="margin: 20px 0; color: #555;">${message}</p>
                <button class="btn-scan" onclick="location.reload()" style="background: var(--error);">
                    <i class="fa fa-redo"></i> Réessayer
                </button>
            `;
        }
        
        function closeWindow() {
            window.close();
            setTimeout(() => {
                document.body.innerHTML = '<div style="text-align:center;padding:50px;"><h3>Fenêtre fermable</h3><p>Document transféré avec succès</p></div>';
            }, 100);
        }
    </script>
</body>
</html>
