<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbrella Mobile Scan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #311038; --accent: #F0D13C; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5fa; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; width: 85%; max-width: 400px; padding: 40px 20px; border-radius: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-scan { background: var(--primary); color: var(--accent); border: none; padding: 20px 30px; border-radius: 20px; font-weight: 800; font-size: 1.1rem; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; -webkit-tap-highlight-color: transparent; }
        .btn-scan:active { transform: scale(0.98); opacity: 0.9; }
        .loading { display: none; color: var(--primary); font-weight: 600; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://oysdycuouodarfkmdtop.supabase.co/storage/v1/object/public/LOGO/Moniteo.png" style="height:35px; margin-bottom:30px;">
        <h2 style="color:var(--primary)">Numérisation</h2>
        <p style="color:#888; margin-bottom:40px;">Prenez une photo claire de votre document pour le transférer sur votre ordinateur.</p>
        
        <input type="file" id="cameraInput" accept="image/*" capture="camera" style="display:none">
        <button class="btn-scan" onclick="document.getElementById('cameraInput').click()">
            <i class="fa fa-camera"></i> PRENDRE PHOTO
        </button>
        
        <div id="loader" class="loading">
            <i class="fa fa-spinner fa-spin"></i> Envoi vers l'ordinateur...
        </div>
    </div>
     <div style="margin-bottom: 20px; display: flex; justify-content: center; gap: 10px;">
    <label style="font-size: 0.9rem;">
        <input type="radio" name="scanMode" value="color" checked> Couleur
    </label>
    <label style="font-size: 0.9rem;">
        <input type="radio" name="scanMode" value="grayscale"> Noir & Blanc
    </label>
  </div>
    <script>
        // --- CONFIGURATION ---
        const BASE_URL = "https://umbrella-free-pdf.onrender.com"; // TON URL RENDER
        const urlParams = new URLSearchParams(window.location.search);
        const session = urlParams.get('s');

        document.getElementById('cameraInput').onchange = async function(e) {
            const file = e.target.files[0];
            if (!file || !session) {
                alert("Session invalide ou aucun fichier.");
                return;
            }

            document.getElementById('loader').style.display = 'block';
            document.querySelector('.btn-scan').style.display = 'none';
            
            const formData = new FormData();
            formData.append('file', file);

            try {
                // Utilisation de l'URL absolue pour Render
                const res = await fetch(`${BASE_URL}/scan/upload-mobile/${session}`, { 
                    method: 'POST', 
                    body: formData 
                });

                if (res.ok) {
                    document.body.innerHTML = `
                        <div class="card">
                            <i class="fa fa-check-circle" style="font-size:4rem; color:#27ae60; margin-bottom:20px;"></i>
                            <h2 style="color:var(--primary)">Envoyé !</h2>
                            <p>Le document est arrivé sur votre ordinateur. Vous pouvez fermer cette page.</p>
                        </div>`;
                } else {
                    throw new Error("Erreur serveur");
                }
            } catch (err) { 
                alert("Erreur de transfert. Vérifiez votre connexion internet.");
                document.getElementById('loader').style.display = 'none';
                document.querySelector('.btn-scan').style.display = 'flex';
            }
        };
        // Dans ta fonction onchange de l'input camera :
    const mode = document.querySelector('input[name="scanMode"]:checked').value;
    formData.append('mode', mode); // On envoie le choix au serveur
    </script>
</body>
</html>
