<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbrella Mobile Scan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #311038; --accent: #F0D13C; }
        body { font-family: -apple-system, sans-serif; background: #f5f5fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; width: 85%; max-width: 400px; padding: 40px 20px; border-radius: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-scan { background: var(--primary); color: var(--accent); border: none; padding: 20px 30px; border-radius: 20px; font-weight: 800; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .loading { display: none; color: var(--primary); font-weight: 600; margin-top: 20px; }
        .modes { margin-bottom: 25px; display: flex; justify-content: center; gap: 20px; color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>
    <div class="card" id="mainCard">
        <img src="https://oysdycuouodarfkmdtop.supabase.co/storage/v1/object/public/LOGO/Moniteo.png" style="height:35px; margin-bottom:30px;">
        <h2 style="color:var(--primary)">Numérisation</h2>
        <p style="color:#888; margin-bottom:30px;">Prenez une photo de votre document.</p>
        
        <div class="modes">
            <label><input type="radio" name="scanMode" value="color" checked> Couleur</label>
            <label><input type="radio" name="scanMode" value="grayscale"> N&B</label>
        </div>

        <input type="file" id="cameraInput" accept="image/*" capture="camera" style="display:none">
        
        <button class="btn-scan" id="uploadBtn" onclick="document.getElementById('cameraInput').click()">
            <i class="fa fa-camera"></i> PRENDRE PHOTO
        </button>
        
        <div id="loader" class="loading">
            <i class="fa fa-spinner fa-spin"></i> Traitement et envoi...
        </div>
    </div>

    <script>
        const BASE_URL = window.location.origin; // Dynamique : s'adapte à Render automatiquement
        const urlParams = new URLSearchParams(window.location.search);
        const session = urlParams.get('s');

        document.getElementById('cameraInput').onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!session) { alert("Session expirée"); return; }

            // UI State
            const loader = document.getElementById('loader');
            const btn = document.getElementById('uploadBtn');
            const mode = document.querySelector('input[name="scanMode"]:checked').value;

            loader.style.display = 'block';
            btn.style.display = 'none';
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('mode', mode); // Bien envoyé au @app.post

            try {
                // Utilisation de l'URL construite proprement
                const res = await fetch(`${BASE_URL}/scan/upload-mobile/${session}`, { 
                    method: 'POST', 
                    body: formData 
                });

                if (res.ok) {
                    document.getElementById('mainCard').innerHTML = `
                        <i class="fa fa-check-circle" style="font-size:4rem; color:#27ae60; margin-bottom:20px;"></i>
                        <h2 style="color:var(--primary)">Envoyé !</h2>
                        <p>Le document est prêt sur votre ordinateur.</p>
                        <button class="btn-scan" onclick="window.close()" style="margin-top:20px; font-size:0.9rem">Fermer</button>`;
                } else {
                    const errData = await res.json();
                    throw new Error(errData.detail || "Erreur serveur");
                }
            } catch (err) { 
                alert("Erreur: " + err.message);
                loader.style.display = 'none';
                btn.style.display = 'flex';
            }
        };
    </script>
</body>
</html>
